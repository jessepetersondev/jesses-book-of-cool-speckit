  <text x="1241" y="181" text-anchor="middle" fill="#92400E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800">BROWNFIELD</text>
  <rect x="1326" y="156" width="102" height="38" rx="19" fill="#DBEAFE"/>
